name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check (web)
        run: cargo check --target wasm32-unknown-unknown

  build-web:
    name: Build & Push Web Image
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Install Rust toolchain + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache Dioxus CLI binary
        uses: actions/cache@v4
        id: cache-dx
        with:
          path: ~/.cargo/bin/dx
          key: dioxus-cli-0.7.7-${{ runner.os }}

      - name: Install Dioxus CLI
        if: steps.cache-dx.outputs.cache-hit != 'true'
        run: cargo install dioxus-cli --version "=0.7.7" --locked

      - name: Set ANDROID_NDK_HOME
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Build Android APK
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: dx build --platform android --release

      - name: Locate APK
        run: |
          # dioxus 0.6+ places the APK under target/dx/<crate>/release/android/
          # then into the standard Gradle output structure beneath that.
          APK=$(find target/dx -name '*.apk' -not -path '*/debug/*' 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "No release APK found. All APK files present:"
            find . -name '*.apk' 2>/dev/null || echo "(none)"
            exit 1
          fi
          echo "Found APK: $APK"
          echo "APK_PATH=$APK" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ env.APK_PATH }}
          if-no-files-found: error

  release-android:
    name: Release Android APK
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: apk/

      # Delete the previous nightly release so we can replace it cleanly
      - name: Delete existing nightly release
        run: gh release delete nightly --cleanup-tag --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nightly GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Android (Latest)"
          body: "Latest Android build from the main branch."
          prerelease: true
          make_latest: false
          files: apk/*.apk

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/my-file-cloud
            docker compose pull
            docker compose up -d
            docker image prune -f
