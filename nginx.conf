server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Send all routes to index.html for Dioxus client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for content-hashed static assets
    location ~* \.(wasm|js|css|png|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
